<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
</head>
<body>
    <h1>Se connecter</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Se connecter</button>
        <p><a href="{% url 'password_reset' %}">Mot de passe oublié ?</a></p>
    </form>

    <p>Pas encore de compte ? <a href="{% url 'inscription' %}">Créer un compte</a></p>
</body>
</html>

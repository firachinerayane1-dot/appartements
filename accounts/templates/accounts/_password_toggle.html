<script>document.querySelectorAll('.password-toggle').forEach(button=>button.addEventListener('click',()=>{const input=document.getElementById(button.dataset.target),visible=input.type==='text';input.type=visible?'password':'text';button.textContent=visible?'Afficher':'Masquer';button.setAttribute('aria-label',visible?'Afficher le mot de passe':'Masquer le mot de passe')}));</script>
